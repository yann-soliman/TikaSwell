services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      TIKASWELL_DB_PATH: /app/data/tikaswell.db
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://marine-api.open-meteo.com}
    volumes:
      - tikaswell-data:/app/data
    ports:
      - "${TIKASWELL_HTTP_PORT:-8080}:8080"

volumes:
  tikaswell-data:
