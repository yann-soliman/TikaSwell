services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TIKASWELL_HTTP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      TIKASWELL_DB_PATH: ${TIKASWELL_DB_PATH:-/app/data/tikaswell.db}
      TIKASWELL_SPOT_ID: ${TIKASWELL_SPOT_ID:-initial}
      TIKASWELL_SPOT_NAME: ${TIKASWELL_SPOT_NAME:-Initial spot}
      TIKASWELL_SPOT_LATITUDE: ${TIKASWELL_SPOT_LATITUDE:-47.2465}
      TIKASWELL_SPOT_LONGITUDE: ${TIKASWELL_SPOT_LONGITUDE:--2.1668}
      OPEN_METEO_WEATHER_BASE_URL: ${OPEN_METEO_WEATHER_BASE_URL:-https://api.open-meteo.com}
      OPEN_METEO_MARINE_BASE_URL: ${OPEN_METEO_MARINE_BASE_URL:-https://marine-api.open-meteo.com}
      STORMGLASS_BASE_URL: ${STORMGLASS_BASE_URL:-https://api.stormglass.io}
      STORMGLASS_API_KEY: ${STORMGLASS_API_KEY:-}
      TIKASWELL_TIDE_MAX_PROVIDER_CALLS_PER_DAY: ${TIKASWELL_TIDE_MAX_PROVIDER_CALLS_PER_DAY:-6}
      TIKASWELL_TIDE_PREFETCH_ENABLED: ${TIKASWELL_TIDE_PREFETCH_ENABLED:-true}
      TIKASWELL_TIDE_PREFETCH_CRON: "${TIKASWELL_TIDE_PREFETCH_CRON:-0 0 3 * * *}"
      TIKASWELL_TIDE_PREFETCH_ZONE: ${TIKASWELL_TIDE_PREFETCH_ZONE:-Europe/Paris}
      TIKASWELL_TIDE_PREFETCH_DAYS_AHEAD: ${TIKASWELL_TIDE_PREFETCH_DAYS_AHEAD:-7}
      TIKASWELL_TIDE_PREFETCH_STARTUP_DAYS_AHEAD: ${TIKASWELL_TIDE_PREFETCH_STARTUP_DAYS_AHEAD:-1}
    volumes:
      - tikaswell-data:/app/data

volumes:
  tikaswell-data:
