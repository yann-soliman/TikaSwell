services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${TIKASWELL_HTTP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      TIKASWELL_DB_PATH: ${TIKASWELL_DB_PATH:-/app/data/tikaswell.db}
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://marine-api.open-meteo.com}
    volumes:
      - tikaswell-data:/app/data

volumes:
  tikaswell-data:
