spring:
  application:
    name: TikaSwell
  datasource:
    url: jdbc:sqlite:${TIKASWELL_DB_PATH:./data/tikaswell.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      tracking-modes: cookie

tikaswell:
  spot:
    id: initial
    name: Initial spot
    latitude: 47.2465
    longitude: -2.1668
  open-meteo:
    weather-base-url: ${OPEN_METEO_WEATHER_BASE_URL:https://api.open-meteo.com}
    marine-base-url: ${OPEN_METEO_MARINE_BASE_URL:${OPEN_METEO_BASE_URL:https://marine-api.open-meteo.com}}
  conditions:
    backfill:
      enabled: ${TIKASWELL_CONDITIONS_BACKFILL_ENABLED:true}
      days-before: ${TIKASWELL_CONDITIONS_BACKFILL_DAYS_BEFORE:30}
      zone: ${TIKASWELL_CONDITIONS_BACKFILL_ZONE:Europe/Paris}
  api-maree:
    base-url: ${API_MAREE_BASE_URL:https://api-maree.fr}
    api-key: ${API_MAREE_API_KEY:}
    site-id: ${API_MAREE_SITE_ID:saint-nazaire}
    step-minutes: ${API_MAREE_STEP_MINUTES:10}
    timezone: ${API_MAREE_TIMEZONE:Europe/Paris}
  tide:
    max-provider-calls-per-day: ${TIKASWELL_TIDE_MAX_PROVIDER_CALLS_PER_DAY:120}
    prefetch:
      enabled: ${TIKASWELL_TIDE_PREFETCH_ENABLED:true}
      cron: "${TIKASWELL_TIDE_PREFETCH_CRON:0 0 3 * * *}"
      zone: ${TIKASWELL_TIDE_PREFETCH_ZONE:Europe/Paris}
      days-before: ${TIKASWELL_TIDE_PREFETCH_DAYS_BEFORE:30}
      days-ahead: ${TIKASWELL_TIDE_PREFETCH_DAYS_AHEAD:30}
      startup-days-before: ${TIKASWELL_TIDE_PREFETCH_STARTUP_DAYS_BEFORE:30}
      startup-days-ahead: ${TIKASWELL_TIDE_PREFETCH_STARTUP_DAYS_AHEAD:30}
