spring:
  application:
    name: TikaSwell
  datasource:
    url: jdbc:sqlite:${TIKASWELL_DB_PATH:./data/tikaswell.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration

tikaswell:
  spot:
    id: initial
    name: Initial spot
    latitude: 47.2465
    longitude: -2.1668
  open-meteo:
    weather-base-url: ${OPEN_METEO_WEATHER_BASE_URL:https://api.open-meteo.com}
    marine-base-url: ${OPEN_METEO_MARINE_BASE_URL:${OPEN_METEO_BASE_URL:https://marine-api.open-meteo.com}}
