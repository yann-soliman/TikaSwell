spring:
  datasource:
    url: jdbc:sqlite:file:tikaswell-test?mode=memory&cache=shared
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-test-query: SELECT 1

server:
  servlet:
    session:
      tracking-modes: cookie

tikaswell:
  spot:
    id: initial
    name: Initial spot
    latitude: 47.2465
    longitude: -2.1668
  open-meteo:
    weather-base-url: http://localhost/weather-test
    marine-base-url: http://localhost/marine-test
  conditions:
    backfill:
      enabled: true
      days-before: 30
      cron: "0 30 3 * * *"
      zone: Europe/Paris
  api-maree:
    base-url: http://localhost/api-maree-test
    api-key:
    site-id: saint-nazaire
    step-minutes: 10
    timezone: Europe/Paris
  tide:
    max-provider-calls-per-day: 6
    prefetch:
      enabled: false
