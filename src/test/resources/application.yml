spring:
  datasource:
    url: jdbc:sqlite:file:tikaswell-test?mode=memory&cache=shared
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-test-query: SELECT 1

tikaswell:
  spot:
    id: initial
    name: Initial spot
    latitude: 47.2465
    longitude: -2.1668
  open-meteo:
    weather-base-url: http://localhost/weather-test
    marine-base-url: http://localhost/marine-test
  stormglass:
    base-url: http://localhost/stormglass-test
    api-key:
  tide:
    max-provider-calls-per-day: 6
